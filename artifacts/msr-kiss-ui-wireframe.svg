<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title id="title">MSR Meeting Recorder KISS UI wireframe</title>
  <desc id="desc">A simple macOS desktop app layout with a top recording bar, a recording history sidebar, and a progressive transcript detail area.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#111827" flood-opacity="0.18"/>
    </filter>
    <linearGradient id="meter" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="68%" stop-color="#84cc16"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>

  <rect width="1440" height="900" fill="#eef2f7"/>

  <g filter="url(#shadow)">
    <rect x="80" y="60" width="1280" height="780" rx="20" fill="#fbfbfc" stroke="#d0d5dd"/>

    <rect x="80" y="60" width="1280" height="58" rx="20" fill="#f7f7f8"/>
    <rect x="80" y="96" width="1280" height="22" fill="#f7f7f8"/>
    <circle cx="113" cy="89" r="11" fill="#ff5f57"/>
    <circle cx="148" cy="89" r="11" fill="#ffbd2e"/>
    <circle cx="183" cy="89" r="11" fill="#28c840"/>
    <text x="220" y="98" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="22" font-weight="700" fill="#344054">MSR Meeting Recorder</text>

    <rect x="80" y="118" width="1280" height="102" fill="#ffffff"/>
    <line x1="80" y1="220" x2="1360" y2="220" stroke="#d8dee8"/>

    <text x="112" y="156" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15" fill="#667085">Source</text>
    <rect x="112" y="168" width="258" height="38" rx="9" fill="#eef2f7" stroke="#d0d5dd"/>
    <rect x="112" y="168" width="92" height="38" rx="9" fill="#ffffff" stroke="#98a2b3"/>
    <text x="142" y="192" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15" font-weight="700" fill="#111827">Mic</text>
    <text x="220" y="192" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15" fill="#344054">System</text>
    <text x="298" y="192" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15" fill="#344054">Both</text>

    <text x="424" y="156" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15" fill="#667085">Mic</text>
    <rect x="424" y="172" width="190" height="12" rx="6" fill="#e4e7ec"/>
    <rect x="424" y="172" width="132" height="12" rx="6" fill="url(#meter)"/>
    <text x="424" y="203" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="13" fill="#16a34a">signal detected</text>

    <text x="662" y="156" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15" fill="#667085">System</text>
    <rect x="662" y="172" width="190" height="12" rx="6" fill="#e4e7ec"/>
    <rect x="662" y="172" width="84" height="12" rx="6" fill="#3b82f6"/>
    <text x="662" y="203" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="13" fill="#2563eb">capturing audio</text>

    <text x="925" y="194" font-family="SFMono-Regular, Menlo, monospace" font-size="30" font-weight="700" fill="#111827">00:12</text>
    <rect x="1048" y="156" width="204" height="54" rx="13" fill="#dc2626"/>
    <text x="1088" y="190" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" font-weight="700" fill="#ffffff">Stop Recording</text>
    <circle cx="1310" cy="183" r="24" fill="#f2f4f7" stroke="#d0d5dd"/>
    <text x="1298" y="192" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="23" fill="#344054">&#9881;</text>

    <rect x="80" y="220" width="310" height="620" fill="#f6f8fb"/>
    <line x1="390" y1="220" x2="390" y2="840" stroke="#d8dee8"/>
    <text x="112" y="265" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="20" font-weight="700" fill="#111827">Recordings</text>
    <text x="112" y="299" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#667085">TODAY</text>

    <rect x="100" y="318" width="270" height="74" rx="10" fill="#ffffff" stroke="#7aa2f7" stroke-width="2"/>
    <rect x="112" y="337" width="5" height="35" rx="3" fill="#3b82f6"/>
    <text x="128" y="345" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="16" font-weight="700" fill="#111827">Client weekly sync</text>
    <text x="128" y="371" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="13" fill="#667085">Mic + System - 12:42</text>

    <rect x="100" y="404" width="270" height="68" rx="10" fill="#f6f8fb"/>
    <text x="128" y="431" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="16" fill="#1f2937">Product discussion</text>
    <text x="128" y="455" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="13" fill="#667085">Mic - 05:31</text>

    <text x="112" y="514" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#667085">YESTERDAY</text>
    <rect x="100" y="532" width="270" height="68" rx="10" fill="#f6f8fb"/>
    <text x="128" y="559" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="16" fill="#1f2937">Standup</text>
    <text x="128" y="583" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="13" fill="#667085">System - 09:10</text>

    <text x="430" y="276" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="28" font-weight="750" fill="#111827">Client weekly sync</text>
    <text x="430" y="306" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="14" fill="#667085">Mic + System - 12:42 - saved 2 minutes ago</text>

    <rect x="430" y="335" width="876" height="68" rx="12" fill="#f8fafc" stroke="#e4e7ec"/>
    <circle cx="466" cy="369" r="18" fill="#ffffff" stroke="#d0d5dd"/>
    <polygon points="461,358 461,380 480,369" fill="#111827"/>
    <text x="506" y="375" font-family="SFMono-Regular, Menlo, monospace" font-size="15" fill="#344054">00:00 / 12:42</text>
    <rect x="640" y="365" width="420" height="8" rx="4" fill="#e4e7ec"/>
    <rect x="640" y="365" width="0" height="8" rx="4" fill="#3b82f6"/>
    <rect x="1128" y="351" width="142" height="36" rx="9" fill="#ffffff" stroke="#d0d5dd"/>
    <text x="1153" y="374" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15" font-weight="650" fill="#344054">Rename</text>

    <rect x="430" y="429" width="254" height="44" rx="10" fill="#2563eb"/>
    <text x="462" y="457" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="16" font-weight="700" fill="#ffffff">Transcribe with ElevenLabs</text>
    <rect x="696" y="429" width="140" height="44" rx="10" fill="#ffffff" stroke="#d0d5dd"/>
    <text x="731" y="457" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="16" font-weight="650" fill="#344054">Copy</text>
    <rect x="850" y="429" width="150" height="44" rx="10" fill="#ffffff" stroke="#d0d5dd"/>
    <text x="884" y="457" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="16" font-weight="650" fill="#344054">Finder</text>

    <text x="430" y="527" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="20" font-weight="750" fill="#111827">Transcript</text>
    <rect x="430" y="548" width="580" height="228" rx="12" fill="#ffffff" stroke="#d0d5dd"/>
    <text x="454" y="589" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="17" fill="#344054">Transcript text appears here after ElevenLabs finishes.</text>
    <text x="454" y="625" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="17" fill="#667085">Keep this area editable and easy to copy.</text>
    <text x="454" y="661" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="17" fill="#667085">Summary stays secondary until it exists.</text>

    <text x="1042" y="527" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="20" font-weight="750" fill="#111827">Summary</text>
    <rect x="1042" y="548" width="264" height="228" rx="12" fill="#ffffff" stroke="#d0d5dd"/>
    <text x="1066" y="588" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="16" fill="#344054">Key decisions</text>
    <line x1="1066" y1="608" x2="1268" y2="608" stroke="#e4e7ec"/>
    <text x="1066" y="640" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="16" fill="#344054">Action items</text>
    <line x1="1066" y1="660" x2="1268" y2="660" stroke="#e4e7ec"/>
    <text x="1066" y="692" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="16" fill="#344054">Follow-ups</text>
  </g>
</svg>
